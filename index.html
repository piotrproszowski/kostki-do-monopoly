<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kostki do Monopoly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Kostki do Monopoly</h1>

        <div class="dice-container">
            <div class="dice" id="dice1">
                <div class="face front">
                    <div class="dot"></div>
                </div>
                <div class="face back">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="face right">
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="face left">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="face top">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="face bottom">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>

            <div class="dice" id="dice2">
                <div class="face front">
                    <div class="dot"></div>
                </div>
                <div class="face back">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="face right">
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="face left">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="face top">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="face bottom">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="settings">
                <label for="diceCount">Liczba kostek:</label>
                <select id="diceCount" class="dice-selector">
                    <option value="1">1</option>
                    <option value="2" selected>2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>
            <button id="rollButton" class="roll-btn">Rzuć kostkami!</button>
            <div class="result" id="result">
                <div class="dice-result">
                    <span>Kostka 1: <span id="dice1Result">1</span></span>
                    <span>Kostka 2: <span id="dice2Result">1</span></span>
                </div>
                <div class="total">Suma: <span id="totalResult">2</span></div>
            </div>

            <div class="history-container">
                <div class="history-title">Historia rzutów</div>
                <ul class="history-list" id="historyList">
                    <!-- History items will appear here -->
                </ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
